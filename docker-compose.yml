version: '3.8'

# Explicit project name so this does not collide with the unrelated
# backend-tb-node project (the directory basename is also "backend-tb-node").
name: status-threshold

services:
  status-threshold:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: status-threshold
    image: dharshiniradhakrishnan/status-threshold:v0.1
    restart: unless-stopped

    environment:
      - TB_BASE_URL=http://yantra24x7.cloud:8080
      - TB_USERNAME=pms@gmail.com
      - TB_PASSWORD=pmspms
      - TB_INSECURE_TLS=1
      - MQTT_BROKER=mqtt://yantra24x7.cloud:1884
      - MQTT_TOPIC=test/#
      - macro_customer=ca71d920-4d2a-11f1-9352-592ed2a7210c
      - NODE_ENV=development
